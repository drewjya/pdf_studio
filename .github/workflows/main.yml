name: Build Internal Apps
on: 
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        
      - name: Install Dependencies
        run: bun install
        
      - name: Build App
        run: bun run electrobun build --env=stable
        
      # FIX 1: Manually zip the Mac app preserving symlinks (-y)
      - name: Zip Mac App Bundle
        if: matrix.os == 'macos-latest'
        run: |
          cd artifacts
          # -r = recursive, -y = preserve symlinks, -q = quiet
          zip -ryq Mac-App-Bundle.zip *.app
          # Remove the raw unzipped app so the artifact uploader doesn't grab it
          rm -rf *.app
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Electrobun-App-${{ matrix.os }}
          path: artifacts/
